  .controls { display: flex; align-items: center; gap: 8px; margin-top: 10px; }

  .abs-pill.has-abs { background: #ffebeb; color: #ff3b30; }
  .chevron-icon { color: #c7c7cc; font-size: 12px; transition: transform 0.2s; }
  .chevron-icon.open { transform: rotate(180deg); }
  .div-body { display: none; border-top: 1px solid #f2f2f7; }

  .prof-row { display: flex; align-items: center; gap: 10px; padding: 10px 14px; border-bottom: 1px solid #f2f2f7; }

  .prof-info { flex: 1; min-width: 0; }

  .toggle-btn.ausente { background: #fff0f0; border-color: #ffb3b3; }

  .btn-save:active { opacity: 0.85; }

  .rank-row { display: flex; align-items: center; gap: 10px; padding: 11px 14px; border-bottom: 1px solid #f2f2f7; }

  .toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%) translateY(20px); background: #1c1c1e; color: #fff; padding: 10px 20px; border-radius: 20px; font-size: 13px; font-weight: 500; opacity: 0; transition: all 0.3s; pointer-events: none; white-space: nowrap; z-index: 9999; }

let currentView = 'registro';

// ══════════════════════════════════════════
// NPOINT API
// ══════════════════════════════════════════
function setSyncStatus(s) {
  const dot = document.getElementById('sync-dot');
  dot.className = 'sync-dot' + (s==='syncing'?' syncing':s==='error'?' error':'');
}

async function loadData() {
  try {
    setSyncStatus('syncing');
    const r = await fetch(API_URL);
    if (!r.ok) throw new Error('HTTP '+r.status);
    allData = await r.json();
    setSyncStatus('ok');
    localStorage.setItem('ees1_backup', JSON.stringify(allData));
  } catch(e) {
    setSyncStatus('error');
    allData = JSON.parse(localStorage.getItem('ees1_backup') || '{}');
    showToast('Sin conexión. Usando datos locales.');
  }
}

async function saveData() {
  localStorage.setItem('ees1_backup', JSON.stringify(allData));
  try {
    setSyncStatus('syncing');
    // Leer datos frescos antes de guardar (evita que un preceptor pise al otro)
    try {
      const rFresh = await fetch(API_URL);
      if (rFresh.ok) {
        const fresh = await rFresh.json();
        allData = Object.assign({}, fresh, allData);
        localStorage.setItem('ees1_backup', JSON.stringify(allData));
      }
    } catch(e2) {}
    const r = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(allData)
    });
    if (!r.ok) throw new Error('HTTP '+r.status);
    setSyncStatus('ok');
  } catch(e) {
    setSyncStatus('error');
    showToast('Error al sincronizar. Guardado localmente.');
  }
}

function setView(v) {
  currentView = v;
  ['registro','cargos','stats'].forEach(x => {
    const el = document.getElementById('vtab-'+x);
    if(el) el.classList.toggle('active', x===v);
  });
  document.getElementById('header-controls').style.display = v==='registro' ? '' : 'none';
  document.getElementById('bottom-bar').style.display = v==='registro' ? 'flex' : 'none';
  if (v==='registro') renderDivList();
  else renderStats();
}

function setTurno(t) {
  turno = t;
  document.getElementById('tt-tarde').classList.toggle('active', t==='tarde');
  document.getElementById('tt-manana').classList.toggle('active', t==='manana');
  renderDivList();
}

function getDiaSemana(dateStr) {
  const [y,m,d] = dateStr.split('-').map(Number);
  return new Date(y,m-1,d).getDay();
}

function renderDivList() {
  const fecha = document.getElementById('fecha').value;
  const content = document.getElementById('content');
  document.getElementById('bottom-bar').style.display = 'flex';
  if (!fecha) { content.innerHTML='<div class="empty"><div class="empty-icon">📅</div>Seleccioná una fecha</div>'; return; }
  const diaSem = getDiaSemana(fecha);
  if (diaSem===0||diaSem===6) { content.innerHTML='<div class="empty"><div class="empty-icon">🏖️</div>No hay clases los fines de semana</div>'; document.getElementById('bottom-bar').style.display='none'; return; }
  const diaIdx = diaSem - 1;
  const horarios = turno==='tarde' ? horariosTarde : horariosManana;
  const key = `${fecha}_${turno}`;
  if (!sessionAbs[key]) sessionAbs[key] = {...(allData[key]||{})};

  let html = `<div class="section-label">${DIAS[diaSem]} ${fecha.split('-').reverse().join('/')} — ${turno==='tarde'?'Turno tarde (Básica)':'Turno mañana (Superior)'}</div><div class="div-list">`;
  Object.entries(horarios).forEach(([div, profs]) => {
    const hoy = profs.filter(p => p.dias.includes(diaIdx));
    if (!hoy.length) return;
    const absCount = hoy.reduce((s,p) => {
      const hrs = p.horas ? (p.horas[diaIdx]||1) : 1;
      return s + (sessionAbs[key]?.[div+'|'+p.prof+'|'+p.mat] ? hrs : 0);
    }, 0);
    const divId = 'div_'+encodeURIComponent(div).replace(/%/g,'_');
    html += `<div class="div-card">
      <div class="div-header" onclick="toggleDiv('${divId}')">
        <div class="div-name">${div}</div>
        <div style="display:flex;align-items:center;gap:8px">
          <span class="abs-pill ${absCount>0?'has-abs':''}" id="pill_${divId}">✗ ${absCount}h</span>
          <span class="chevron-icon" id="chev_${divId}">▼</span>
        </div>
      </div>
      <div class="div-body" id="body_${divId}">`;
    hoy.forEach(p => {
      const pkey = `${div}|${p.prof}|${p.mat}`;
      const ausente = !!(sessionAbs[key]?.[pkey]);
      const bid = 'b_'+Math.abs(pkey.split('').reduce((a,c)=>((a<<5)-a)+c.charCodeAt(0),0)).toString(36)+'_'+divId;
      html += `<div class="prof-row">
        <div class="prof-info">
          <div class="prof-name">${p.prof}</div>
          <div class="prof-mat">${p.mat}</div>
        </div>
        <button class="toggle-btn ${ausente?'ausente':'presente'}" id="${bid}"
          data-key="${key}" data-div="${encodeURIComponent(div)}" data-prof="${encodeURIComponent(p.prof)}" data-mat="${encodeURIComponent(p.mat)}" data-divid="${divId}"
          onclick="toggleProf(this)">${ausente?'✗':'✓'}</button>
      </div>`;
    });
    html += `</div></div>`;
  });
  // ── CARGOS DEL DÍA ──
  const cargosList = getCargosDelDia(diaIdx, turno);
  if (cargosList.length > 0) {
    const cargoKey = `${fecha}_cargos_${turno}`;
    if (!sessionAbs[cargoKey]) sessionAbs[cargoKey] = {...(allData[cargoKey]||{})};
    const cargosId = 'div_CARGOS_'+turno;
    const absCount = cargosList.filter(c => sessionAbs[cargoKey]?.[c.nombre]).length;
    html += `<div class="div-card">
      <div class="div-header" onclick="toggleDiv('${cargosId}')">
        <div class="div-name">Cargos</div>
        <div style="display:flex;align-items:center;gap:8px">
          <span class="abs-pill ${absCount>0?'has-abs':''}" id="pill_${cargosId}">✗ ${absCount} ausente${absCount!==1?'s':''}</span>
          <span class="chevron-icon" id="chev_${cargosId}">▼</span>
        </div>
      </div>
      <div class="div-body" id="body_${cargosId}">`;
    cargosList.forEach(c => {
      const ausente = !!(sessionAbs[cargoKey]?.[c.nombre]);
      const bid = 'cbtn_'+encodeURIComponent(c.nombre).replace(/%/g,'_')+turno;
      const horaTxt = c.horario[diaIdx] || '';
      html += `<div class="prof-row">
        <div class="prof-info">
          <div class="prof-name">${c.nombre}</div>
          <div class="prof-mat">${c.cargo} — ${horaTxt}</div>
        </div>
        <button class="toggle-btn ${ausente?'ausente':'presente'}" id="${bid}"
          data-key="${cargoKey}" data-div="Cargos" data-prof="${encodeURIComponent(c.nombre)}" data-mat="${encodeURIComponent(c.cargo)}" data-divid="${cargosId}"
          onclick="toggleProf(this)">${ausente?'✗':'✓'}</button>
      </div>`;
    });
    html += `</div></div>`;
  }

  html += '</div>';
  content.innerHTML = html;
}

function toggleDiv(id) {
  document.getElementById('body_'+id)?.classList.toggle('open');
  document.getElementById('chev_'+id)?.classList.toggle('open');
}

function toggleProf(btn) {
  const key = btn.dataset.key;
  const div = decodeURIComponent(btn.dataset.div);
  const prof = decodeURIComponent(btn.dataset.prof);
  const mat = decodeURIComponent(btn.dataset.mat);
  const divId = btn.dataset.divid;
  const btnId = btn.id;
  if (!sessionAbs[key]) sessionAbs[key] = {};
  const pkey = div === 'Cargos' ? prof : `${div}|${prof}|${mat}`;
  if (sessionAbs[key][pkey]) {
    delete sessionAbs[key][pkey];
  } else {
    // Buscar cuántas horas tiene este profe ese día
    const fecha = document.getElementById('fecha').value;
    const diaIdx = getDiaSemana(fecha) - 1;
    const horarios = turno==='tarde' ? horariosTarde : horariosManana;
    if (div === 'Cargos') {
      sessionAbs[key][pkey] = 1; // cargos siempre 1 día
    } else {
      const entry = (horarios[div]||[]).find(p => p.prof===prof && p.mat===mat);
      const hrsCount = entry && entry.horas ? (entry.horas[diaIdx] || entry.horas[String(diaIdx)] || 1) : 1;
      sessionAbs[key][pkey] = hrsCount;
    }
  }
  const ausente = !!(sessionAbs[key][pkey]);
  btn.className='toggle-btn '+(ausente?'ausente':'presente'); btn.textContent=ausente?'✗':'✓';
  const fecha = document.getElementById('fecha').value;
  const diaIdx = getDiaSemana(fecha)-1;
  let absCount = 0;
  if (div === 'Cargos') {
    const cargosList = getCargosDelDia(diaIdx, turno);
    absCount = cargosList.filter(c => sessionAbs[key]?.[c.nombre]).length;
  } else {
    const horarios = turno==='tarde'?horariosTarde:horariosManana;
    const hoy = (horarios[div]||[]).filter(p=>p.dias.includes(diaIdx));
    absCount = hoy.filter(p=>sessionAbs[key]?.[div+'|'+p.prof+'|'+p.mat]).reduce((s,p)=>{
      const hrs = p.horas ? (p.horas[diaIdx]||1) : 1;
      return s + (sessionAbs[key]?.[div+'|'+p.prof+'|'+p.mat] ? hrs : 0);
    }, 0);
  }
  const pill = document.getElementById('pill_'+divId);
  if (pill) { pill.className='abs-pill '+(absCount>0?'has-abs':''); pill.textContent=`✗ ${absCount} ausente${absCount!==1?'s':''}`; }
}

function guardar() {
  const fecha = document.getElementById('fecha').value;
  // Save divisiones
  const key = `${fecha}_${turno}`;
  const limpio = {};
  Object.entries(sessionAbs[key]||{}).forEach(([k,v]) => { if(v) limpio[k] = v; });
  allData[key] = limpio;
  // Save cargos
  const cargoKey = `${fecha}_cargos_${turno}`;
  const limpioC = {};
  Object.entries(sessionAbs[cargoKey]||{}).forEach(([k,v]) => { if(v) limpioC[k] = 1; }); // cargos = 1 dia
  allData[cargoKey] = limpioC;
  saveData();
  showToast('Parte guardado ✓');
}

function cancelar() {
  const fecha = document.getElementById('fecha').value;
  const key = `${fecha}_${turno}`;
  sessionAbs[key] = {...(allData[key]||{})};
  const cargoKey = `${fecha}_cargos_${turno}`;
  sessionAbs[cargoKey] = {...(allData[cargoKey]||{})};
  renderDivList();
}

// ══════════════════════════════════════════
// VISTA ESTADÍSTICAS
// ══════════════════════════════════════════
function getMeses() {
  const meses = new Set();
  Object.keys(allData).forEach(k => { const f=k.split('_')[0]; if(f) meses.add(f.slice(0,7)); });
  return [...meses].sort().reverse();
}

function renderStats() {
  const meses = getMeses();
  // Calcular horas posibles y horas ausentes por profe+div
  // conteo[prof][div] = {posibles: N, ausentes: N, fechas: [{fecha,hrs,div}]}
  const conteo = {};
  let totalHrsAus = 0, diasSet = new Set();

  // Calcular horas posibles: para cada parte cargado, cuántas horas debía estar cada profe
  const partesRegistrados = new Set(
    Object.keys(allData).filter(k => {
      const fecha = k.slice(0, 10);
      const t = k.slice(11);
      if (!fecha) return false;
      if (filtroTurnoStats !== 'todos' && t !== filtroTurnoStats && t !== 'cargos_tarde' && t !== 'cargos_manana') return false;
      if (filtroMes !== 'todos' && !fecha.startsWith(filtroMes)) return false;
      return true;
    }).map(k => k)
  );

  // Para cada parte, calcular ausencias en horas
  Object.entries(allData).forEach(([key, abs]) => {
    if (!partesRegistrados.has(key)) return;
    const fecha = key.slice(0, 10); // YYYY-MM-DD always 10 chars
    const t = key.slice(11); // everything after the date and first underscore
    if (!fecha || !abs) return;
    const isCargo = (t === 'cargos_tarde' || t === 'cargos_manana');
    const diaIdx = getDiaSemana(fecha) - 1;
    if (diaIdx < 0) return;
    if (!isCargo) diasSet.add(fecha); // solo contar días de divisiones, no de cargos

    Object.entries(abs).filter(([,v])=>v).forEach(([pkey, hrs]) => {
      const hasPipe = pkey.indexOf('|') !== -1;
      const nombre = hasPipe ? pkey.split('|')[1] : pkey;
      const div = hasPipe ? pkey.split('|')[0] : 'Cargos';
      const hrsNum = hasPipe ? (typeof hrs === 'number' ? hrs : 1) : 1; // cargos siempre 1 dia
      if (!nombre) return;
      if (!conteo[nombre]) conteo[nombre] = {};
      if (!conteo[nombre][div]) conteo[nombre][div] = {ausentes: 0, posibles: 0, fechas: []};
      conteo[nombre][div].ausentes += hrsNum;
      conteo[nombre][div].fechas.push({fecha, hrs: hrsNum});
      totalHrsAus += hrsNum;
    });
  });

  // Calcular horas posibles por profe+div en los partes registrados
  partesRegistrados.forEach(key => {
    const fecha = key.slice(0, 10);
    const t = key.slice(11);
    if (!fecha) return;
    const diaIdx = getDiaSemana(fecha) - 1;
    if (diaIdx < 0) return;

    if (t === 'cargos_tarde' || t === 'cargos_manana') {
      // Cargos: 1 posible per cargo per day
      const turnoC = t === 'cargos_tarde' ? 'tarde' : 'manana';
      getCargosDelDia(diaIdx, turnoC).forEach(c => {
        if (!conteo[c.nombre]) conteo[c.nombre] = {};
        if (!conteo[c.nombre]['Cargos']) conteo[c.nombre]['Cargos'] = {ausentes: 0, posibles: 0, fechas: []};
        conteo[c.nombre]['Cargos'].posibles += 1;
      });
      return;
    }

    const horarios = t === 'tarde' ? horariosTarde : horariosManana;
    Object.entries(horarios).forEach(([div, profs]) => {
      profs.filter(p => p.dias.includes(diaIdx)).forEach(p => {
        const hrs = p.horas ? (p.horas[diaIdx] || p.horas[String(diaIdx)] || 1) : 1;
        if (!conteo[p.prof]) conteo[p.prof] = {};
        if (!conteo[p.prof][div]) conteo[p.prof][div] = {ausentes: 0, posibles: 0, fechas: []};
        conteo[p.prof][div].posibles += hrs;
      });
    });
  });

  // Ranking: sumar total ausentes y posibles por profe
  const ranking = Object.entries(conteo).map(([prof, divs]) => {
    const totalAus = Object.values(divs).reduce((s,d) => s + d.ausentes, 0);
    const totalPos = Object.values(divs).reduce((s,d) => s + d.posibles, 0);
    return {prof, divs, totalAus, totalPos};
  }).filter(r => r.totalAus > 0).sort((a,b) => b.totalAus - a.totalAus);

  const mesLabel = filtroMes==='todos' ? 'todos los meses' : (() => { const [y,m]=filtroMes.split('-'); return `${MESES[parseInt(m)-1]} ${y}`; })();

  let html = `<input type="search" class="search-box" id="stats-search" placeholder="Buscar docente..." oninput="filterSearch(this.value)">`;

  // Filtros turno
  html += `<div class="turno-filter">
    <button class="mes-btn ${filtroTurnoStats==='todos'?'active':''}" onclick="setFT('todos')">Ambos</button>
    <button class="mes-btn ${filtroTurnoStats==='tarde'?'active':''}" onclick="setFT('tarde')">Tarde</button>
    <button class="mes-btn ${filtroTurnoStats==='manana'?'active':''}" onclick="setFT('manana')">Mañana</button>
  </div>`;

  // Filtro mes
  html += `<div class="mes-filter"><button class="mes-btn ${filtroMes==='todos'?'active':''}" onclick="setFM('todos')">Todos</button>`;
  meses.forEach(m => {
    const [y,mo] = m.split('-');
    html += `<button class="mes-btn ${filtroMes===m?'active':''}" onclick="setFM('${m}')">${MESES[parseInt(mo)-1].slice(0,3)} ${y}</button>`;
  });
  html += `</div>`;

  // Cards resumen
  html += `<div class="stats-grid">
    <div class="stat-card"><div class="stat-num">${totalHrsAus}</div><div class="stat-lbl">Horas ausentes</div></div>
    <div class="stat-card"><div class="stat-num">${diasSet.size}</div><div class="stat-lbl">Días registrados</div></div>
    <div class="stat-card"><div class="stat-num">${ranking.length}</div><div class="stat-lbl">Docentes con faltas</div></div>
    <div class="stat-card"><div class="stat-num">${diasSet.size ? Math.round(totalHrsAus/diasSet.size*10)/10 : 0}</div><div class="stat-lbl">Prom. horas/día</div></div>
  </div>`;

  html += `<div class="section-label" id="ranking-label">Ranking — ${mesLabel}</div>`;

  if (!ranking.length) {
    html += `<div class="empty" id="ranking-list"><div class="empty-icon">🎉</div>Sin inasistencias registradas</div>`;
  } else {
    html += `<div id="ranking-list">`;
    ranking.forEach(({prof, divs, totalAus, totalPos}, i) => {
      const pct = totalPos > 0 ? Math.round(totalAus/totalPos*100) : 0;
      const rid = 'rank_'+i;
      html += `<div class="div-card" style="margin-bottom:8px">
        <div class="div-header" onclick="toggleDiv('${rid}')">
          <div style="flex:1;min-width:0">
            <div class="div-name" style="font-size:14px">${prof}</div>
            <div style="font-size:12px;color:#8e8e93;margin-top:2px">${totalAus}h ausente${totalAus!==1?'s':''} · ${pct}% de inasistencia</div>
          </div>
          <div style="display:flex;align-items:center;gap:8px">
            <span class="abs-pill has-abs">${i+1}°</span>
            <span class="chevron-icon" id="chev_${rid}">▼</span>
          </div>
        </div>
        <div class="div-body" id="body_${rid}">`;

      Object.entries(divs).filter(([,d])=>d.ausentes>0).sort((a,b)=>b[1].ausentes-a[1].ausentes).forEach(([div, d]) => {
        const divPct = d.posibles > 0 ? Math.round(d.ausentes/d.posibles*100) : 0;
        // Group fechas
        const fechasStr = d.fechas.map(f => {
          const [y,m,dd] = f.fecha.split('-');
          return `${dd}/${m} (${f.hrs}h)`;
        }).join(', ');
        html += `<div class="prof-row" style="flex-direction:column;align-items:flex-start;gap:4px">
          <div style="display:flex;justify-content:space-between;width:100%;align-items:center">
            <div class="prof-name">${div}</div>
            <div style="display:flex;gap:5px">
              <span class="badge-mes">${d.ausentes}h / ${d.posibles}h</span>
              <span class="badge-total">${divPct}%</span>
            </div>
          </div>
          <div class="prof-mat" style="color:#8e8e93">${fechasStr}</div>
        </div>`;
      });

      html += `</div></div>`;
    });
    html += `</div>`;
  }

  document.getElementById('content').innerHTML = html;
  const si = document.getElementById('stats-search');
  if (si && searchQuery) { si.value = searchQuery; filterSearch(searchQuery); }
}

function setFM(m) { filtroMes=m; searchQuery=''; renderStats(); }
function setFT(t) { filtroTurnoStats=t; searchQuery=''; renderStats(); }

// UTILS

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

  {cargo:"Director/a",       nombre:"Gonzalez, Martina",    horario:{0:"8:30-14:30",  1:"12:40-18:40",2:"9:40-15:40", 3:"12:40-18:40",4:"8:30-14:30"}},

  {cargo:"Secretaria",       nombre:"Gavio, Camila",        horario:{0:"8:30-13:00",  1:"7:30-12:00", 2:"7:30-12:00", 3:"14:10-18:40",4:"13:00-17:30"}},
  {cargo:"Secretaria",       nombre:"Castañares, Celes",    horario:{0:"14:20-18:40", 1:"8:30-13:00", 2:"13:00-17:30",3:"7:30-12:00", 4:"8:30-13:00"}},
  {cargo:"Jefe PRs",         nombre:"Romagnoli, Walter",    horario:{0:"8:30-12:55",  1:"7:30-12:00", 2:"13:15-17:35",3:"7:30-12:00", 4:"13:15-17:35"}},

  {cargo:"Bibliotecaria",    nombre:"Schwindt, Estefania",  horario:{0:"13:10-17:40", 1:"14:10-18:40",2:"13:10-17:40",3:"14:10-18:40",4:"13:10-17:40"}},
];

function isTarde(h) {
  if (!h) return false;
  return parseInt(h.split(':')[0]) >= 13;
}

function getCargosDelDia(diaIdx, turno) {
  return cargosData.filter(c => {
    const h = c.horario[diaIdx];
    if (!h) return false;
    return turno === 'tarde' ? isTarde(h) : !isTarde(h);
  });
}

function renderCargos() {
  const fecha = document.getElementById('fecha').value;
  const diaSem = fecha ? getDiaSemana(fecha) : -1;
  const diaIdx = diaSem > 0 && diaSem < 6 ? diaSem - 1 : -1;
  const key = fecha && diaIdx >= 0 ? fecha+'_cargos' : null;
  if (key && !sessionAbs[key]) sessionAbs[key] = {...(allData[key]||{})};
  const dias_nombres = ['Lun','Mar','Mié','Jue','Vie'];

  let html = '';
  if (diaIdx >= 0) {
    html += `<div class="section-label">${DIAS[diaSem]} ${fecha.split('-').reverse().join('/')} — Cargos</div>`;
  } else {
    html += `<div class="section-label">Todos los cargos</div>`;
  }

  cargos.forEach((c, ci) => {
    const cid = 'cargo_'+ci;
    const ausente = key ? !!(sessionAbs[key]?.[c.nombre]) : false;
    html += `<div class="cargo-card">
      <div class="cargo-header" onclick="toggleCargo('${cid}')">
        <div>
          <div class="cargo-role">${c.cargo}</div>
          <div class="cargo-name">${c.nombre}</div>
        </div>
        <div style="display:flex;align-items:center;gap:8px">`;
    if (key) {
      const bid = 'cbtn_'+ci;
      html += `<button class="toggle-btn ${ausente?'ausente':'presente'}" id="${bid}"
        data-key="${key}" data-prof="${encodeURIComponent(c.nombre)}" data-mat="CARGO" data-divid="${cid}"
        onclick="toggleCargo_abs(this);event.stopPropagation()">${ausente?'✗':'✓'}</button>`;
    }
    html += `<span class="chevron-icon" id="chev_${cid}">▼</span>
        </div>
      </div>
      <div class="cargo-body" id="body_${cid}">`;
    Object.entries(c.horario).forEach(([d, h]) => {
      html += `<div class="horario-row">
        <div class="dia-lbl">${dias_nombres[parseInt(d)]}</div>
        <div class="hora-txt">${h}</div>
      </div>`;
    });
    html += `</div></div>`;
  });

  if (key) {
    document.getElementById('bottom-bar').style.display = 'flex';
  }
  document.getElementById('content').innerHTML = html;
}

function toggleCargo(id) {
  document.getElementById('body_'+id)?.classList.toggle('open');
  document.getElementById('chev_'+id)?.classList.toggle('open');
}

function toggleCargo_abs(btn) {
  const key = btn.dataset.key;
  const prof = decodeURIComponent(btn.dataset.prof);
  if (!sessionAbs[key]) sessionAbs[key] = {};
  const ausente = !!sessionAbs[key][prof];
  if (ausente) delete sessionAbs[key][prof];
  else sessionAbs[key][prof] = true;
  const nowAusente = !!sessionAbs[key][prof];
  btn.className = 'toggle-btn ' + (nowAusente?'ausente':'presente');
  btn.textContent = nowAusente ? '✗' : '✓';
}

let searchQuery = '';
function filterSearch(q) {
  searchQuery = (q||'').toLowerCase().trim();
  const rankEl = document.getElementById('ranking-list');
  const labelEl = document.getElementById('ranking-label');
  if (!rankEl) return;
  if (!searchQuery) { renderStats(); return; }

  // Filter ranking items
  const items = rankEl.querySelectorAll('.div-card');
  let visible = 0;
  items.forEach(card => {
    const nameEl = card.querySelector('.div-name');
    if (!nameEl) return;
    const name = nameEl.textContent.toLowerCase();
    const show = name.includes(searchQuery);
    card.style.display = show ? '' : 'none';
    if (show) visible++;
  });
  if (labelEl) labelEl.textContent = `Resultados para "${q}" — ${visible} docente${visible!==1?'s':''}`;
}

async function init() {
  const now = new Date();
  const localDate = now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0')+'-'+String(now.getDate()).padStart(2,'0');
  document.getElementById('fecha').value = localDate;
  await loadData();
  renderDivList();
}
init();
